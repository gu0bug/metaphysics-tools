<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>求签 - 知命</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #F7F7F5;
            --bg-surface: #FFFFFF;
            --border-base: #E5E5E0;
            --text-main: #1A1A1A;
            --text-secondary: #666666;
            --accent-gold: #A67C00;
            --state-selected: #F0F0EE;
            --btn-primary: #1D2D44;
        }

        html.dark {
            --bg-primary: #121212;
            --bg-surface: #1A1B1C;
            --border-base: #333333;
            --text-main: #E0E0E0;
            --text-secondary: #888888;
            --accent-gold: #CBA052;
            --state-selected: #2A2A2A;
            --btn-primary: #1D2D44;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .surface-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-base);
            transition: all 0.3s ease;
        }

        .font-serif-sc { font-family: 'Noto Serif SC', 'Songti SC', serif; }
        .text-accent { color: var(--accent-gold); }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(1deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(2deg); }
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            animation-iteration-count: 3;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 竖排文字核心类 */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center py-6 px-4 sm:px-6 lg:px-8 selection:bg-gray-500 selection:text-white relative overflow-hidden">

    <header class="w-full max-w-4xl flex justify-between items-center z-10 shrink-0">
        <a href="index.html" class="text-sm px-4 py-2 surface-card rounded-md cursor-pointer hover:border-gray-500 transition-colors">← 返回</a>
        <h1 class="text-2xl font-serif-sc tracking-widest text-center absolute left-1/2 -translate-x-1/2">求签</h1>
        <div class="w-[74px]"></div>
    </header>

    <main class="w-full max-w-4xl flex-1 flex flex-col items-center justify-center z-10 relative overflow-y-auto no-scrollbar">
        
        <section id="qiuqian-view" class="w-full max-w-sm flex flex-col items-center gap-6 animate-fade-in self-center">
            <div id="lot-container" class="relative surface-card rounded-xl p-6 sm:p-10 flex flex-col items-center shadow-lg group w-48">
                <img src="image_14.png" alt="签筒" class="w-full h-auto object-contain">
                <div class="absolute inset-0 flex justify-center items-center font-serif-sc text-3xl opacity-5 select-none pointer-events-none text-accent">签</div>
            </div>

            <button id="draw-btn" class="w-full py-4 rounded-xl text-white font-serif-sc tracking-[0.2em] pl-[0.2em] hover:opacity-90 transition-opacity mt-4" style="background-color: var(--btn-primary);">
                求签
            </button>
        </section>


        <section id="qiuqian-result-view" class="w-full hidden flex-1 flex flex-col items-center justify-center gap-6 animate-fade-in self-center">
            
            <div class="surface-card rounded-sm p-6 sm:p-10 w-full max-w-md flex flex-col relative shrink-0 bg-white" style="background-color: var(--bg-surface);">
                
                <div class="border-b pb-4 mb-8 text-center" style="border-color: var(--text-main);">
                    <h2 id="res-header" class="text-2xl sm:text-3xl font-serif-sc tracking-widest" style="color: var(--text-main);">第 十二 大吉</h2>
                </div>
                
                <div class="flex justify-center mb-8 h-48 sm:h-56">
                    <div id="res-poem" class="flex flex-row-reverse h-full" style="color: var(--text-main);">
                        </div>
                </div>

                <div class="border-t pt-6 text-sm leading-loose" style="border-color: var(--border-base); color: var(--text-secondary);">
                    <div id="res-advice" class="text-justify font-sans">
                        </div>
                </div>
            </div>

            <div class="flex justify-center gap-4 border-b border-transparent w-full max-w-md shrink-0">
                <button id="reset-btn" class="flex-1 py-3 surface-card rounded-md text-sm tracking-widest cursor-pointer hover:border-gray-500 transition-colors">
                    重新求签
                </button>
                <button id="share-btn" class="flex-1 py-3 surface-card rounded-md text-sm tracking-widest cursor-pointer flex justify-center items-center gap-2 hover:border-gray-500 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                    分享结果
                </button>
            </div>
        </section>

    </main>

    <script>
        const qiuqianData = {
            "fortuneResults": [
                {
                    "level": "大吉",
                    "description": "七宝浮图塔\n高峰顶上安\n众人皆仰望\n莫作等闲看",
                    "advice": "愿望：会充分地实现吧。\n疾病：会治癒吧。\n盼望的人：会出现吧。\n遗失物：变得迟迟地才找到吧。\n盖新居、搬家、嫁娶、旅行、交往等：全部很好吧。"
                },
                {
                    "level": "小吉",
                    "description": "月被浮云翳\n立事自昏迷\n幸乞阴公祐\n何虑不开眉",
                    "advice": "愿望：因为持续不断地努力，必定会实现。\n疾病：虽然拖长，但是之后可以康复吧。\n盼望的人：迟迟地才出现吧。\n遗失物：不能找出来吧。\n交往：要节制吧。\n盖新居、搬家：都不坏吧。\n结亲缘、旅行：顺利进行吧。"
                },
                {
                    "level": "凶",
                    "description": "愁恼损忠良\n青霄一炷香\n虽然防小过\n闲虑觉时长",
                    "advice": "愿望：难实现吧。\n疾病：虽然拖长，但是会治好吧。\n遗失物：难以找到吧。\n盼望的人：要花很久的时间吧。\n旅行：因为很坏，放弃吧。\n盖新居搬家：勉勉强强地算好吧。\n结婚交往：要节制吧。"
                }
            ]
        };

        const NUMBERS_CN = ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二", "十三", "十四", "十五"];

        const qiuqianView = document.getElementById('qiuqian-view');
        const qiuqianResultView = document.getElementById('qiuqian-result-view');
        const lotContainer = document.getElementById('lot-container');
        const drawBtn = document.getElementById('draw-btn');
        const resetBtn = document.getElementById('reset-btn');
        const shareBtn = document.getElementById('share-btn');

        const resHeader = document.getElementById('res-header');
        const resPoem = document.getElementById('res-poem');
        const resAdvice = document.getElementById('res-advice');

        function generateRandomResult() {
            const results = qiuqianData.fortuneResults;
            const chosenResult = results[Math.floor(Math.random() * results.length)];
            const randomNum = Math.floor(Math.random() * 15);

            resHeader.innerText = `第 ${NUMBERS_CN[randomNum]} ${chosenResult.level}`;
            
            const lines = chosenResult.description.split('\n');
            resPoem.innerHTML = '';
            
            lines.forEach((line, index) => {
                const colWrapper = document.createElement('div');
                colWrapper.className = 'h-full flex flex-col justify-center items-center px-3 sm:px-4 border-l';
                colWrapper.style.borderColor = 'var(--text-main)';
                
                if (index === 0) {
                    colWrapper.classList.add('border-r');
                }

                const textSpan = document.createElement('span');
                textSpan.className = 'vertical-text text-xl sm:text-2xl font-serif-sc tracking-[0.3em]';
                textSpan.innerText = line;
                
                colWrapper.appendChild(textSpan);
                resPoem.appendChild(colWrapper);
            });

            resAdvice.innerHTML = chosenResult.advice.split('\n').join('<br>');
        }

        drawBtn.addEventListener('click', () => {
            lotContainer.classList.add('animate-shake');

            setTimeout(() => {
                generateRandomResult();
                qiuqianView.classList.add('hidden');
                qiuqianResultView.classList.remove('hidden');
                lotContainer.classList.remove('animate-shake');
            }, 1600);
        });

        resetBtn.addEventListener('click', () => {
            qiuqianResultView.classList.add('hidden');
            qiuqianView.classList.remove('hidden');
        });

        shareBtn.addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({
                    title: '我在知命求得了灵签！',
                    text: `我在知命求得一签：${resHeader.innerText}。赶快来看看你的运势吧！`
                }).catch(console.error);
            } else {
                alert('分享功能在此浏览器暂不可用。请使用系统自带截图分享您的签文。');
            }
        });
    </script>
</body>
</html>
