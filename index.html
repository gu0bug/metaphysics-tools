    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
            } else {
                htmlElement.classList.add('dark');
            }
        });

        // Initialize Lunar content
        const today = new Date();
        const lunar = Lunar.fromDate(today);

        document.getElementById('today-gregorian').innerText = `公元 ${today.getFullYear()} 年 ${today.getMonth() + 1} 月 ${today.getDate()} 日`;
        document.getElementById('today-lunar-month').innerText = lunar.getMonthInChinese() + '月';
        document.getElementById('today-lunar-day').innerText = lunar.getDayInChinese();

        document.getElementById('today-bazi-year').innerText = `${lunar.getYearInGanZhi()}年 (${lunar.getYearShengXiao()})`;
        document.getElementById('today-bazi-month').innerText = `${lunar.getMonthInGanZhi()}月`;
        document.getElementById('today-bazi-day').innerText = `${lunar.getDayInGanZhi()}日`;

        try {
            const prevJieQi = lunar.getPrevJieQi(true);
            const nextJieQi = lunar.getNextJieQi(true);
            const prevDiff = Math.abs(today.getTime() - prevJieQi.getSolar().getCalendar().getTime());
            const nextDiff = Math.abs(today.getTime() - nextJieQi.getSolar().getCalendar().getTime());
            const nearestTerm = prevDiff < nextDiff ? prevJieQi.getName() : nextJieQi.getName();
            document.getElementById('today-solar-term').innerText = nearestTerm;
        } catch(e) {
            console.error("Error finding solar term:", e);
            document.getElementById('today-solar-term').innerText = "";
        }
    </script>
